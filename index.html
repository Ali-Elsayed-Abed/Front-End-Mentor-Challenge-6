<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fylo-Data-Storage</title>
    <!-- Main CSS File -->
    <link rel="stylesheet" href="CSS/main.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <!-- Render All Elements Normally -->
    <link rel="stylesheet" href="CSS/normalize.css">
</head>

<body>
    <!-- Fylo Structure -->
    <div class="fylo">
        <div class="container">
            <!-- Head -->
            <div class="head">
                <div class="logo">
                    <img src="images/logo.svg" alt="">
                </div>
                <div class="icons">
                    <div class="icon"><img src="images/icon-document.svg" alt=""></div>
                    <div class="icon"><img src="images/icon-folder.svg" alt=""></div>
                    <div class="icon"><img src="images/icon-upload.svg" alt=""></div>
                </div>
            </div>
            <!-- Head -->
            <!-- Body -->
            <div class="body">
                <div class="used-space">
                    <div class="text">You've used <span>8</span><span>1</span><span>5</span><span>GB</span> of your
                        storage</div>
                    <div class="progress">
                        <span></span>
                    </div>
                </div>
                <div class="left-space">
                    <span>1</span>
                    <span>8</span>
                    <span>5</span>
                    <div class="text">GB Left</div>
                </div>
            </div>
            <!-- Body -->
        </div>
    </div>
    <!-- Fylo Structure -->
</body>

</html>
